<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comprehension Compiler</title>
  <script>__CYTOSCAPE_JS__</script>
  <script>__CYTOSCAPE_DAGRE_JS__</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: monospace; display: flex; height: 100vh; background: #1a1a2e; color: #e0e0e0; overflow: hidden; }

    #sidebar {
      width: 270px; flex-shrink: 0;
      overflow-y: auto; border-right: 1px solid #333; padding: 8px;
      display: flex; flex-direction: column;
    }

    #main { flex: 1; position: relative; display: flex; min-width: 0; }

    #cy { flex: 1; min-width: 0; background: #12122a; }

    #placeholder {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: #445; font-size: 14px; pointer-events: none;
    }

    #panel {
      width: 340px; flex-shrink: 0; border-left: 1px solid #333;
      padding: 12px; overflow-y: auto; display: none; background: #1a1a2e;
    }

    .ep-btn {
      display: block; text-align: left; width: 100%; margin: 2px 0;
      padding: 4px 8px; background: #252545; border: 1px solid #333;
      cursor: pointer; color: #e0e0e0; font-family: monospace; font-size: 11px;
      border-radius: 3px; transition: background 0.1s;
    }
    .ep-btn:hover  { background: #353565; }
    .ep-btn.active { background: #4a3070; border-color: #7755aa; }

    .ep-namespace {
      font-size: 10px; font-weight: bold; color: #778; text-transform: uppercase;
      letter-spacing: 0.3px; margin: 8px 0 2px; padding-top: 4px;
      border-top: 1px solid #2a2a45;
    }
    .ep-namespace:first-child { margin-top: 0; padding-top: 0; border-top: none; }

    .badge { font-size: 10px; padding: 1px 4px; border-radius: 3px; color: #fff; margin-right: 4px; }
    .GET { background: #28a745; } .POST { background: #007bff; }
    .PUT { background: #fd7e14; } .DELETE { background: #dc3545; }
    .PATCH { background: #6f42c1; }

    .section-title {
      font-size: 11px; font-weight: bold; color: #8899bb;
      margin: 12px 0 5px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .edge-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 11px; cursor: pointer; }
    .edge-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .node-legend { display: flex; align-items: center; gap: 6px; margin: 2px 0; font-size: 11px; }
    .node-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .gap-item { margin: 3px 0; font-size: 10px; padding: 4px 6px; border-radius: 3px; border-left: 3px solid; }
    .gap-warning { border-color: #f0ad4e; background: #2a2010; color: #f0ad4e; }
    .gap-error   { border-color: #dc3545; background: #2a1015; color: #ff8895; }

    #panel h3 { margin-top: 0; color: #aad; font-size: 13px; word-break: break-all; }
    #panel pre { background: #12122a; padding: 8px; overflow-x: auto; font-size: 11px; border: 1px solid #333; border-radius: 3px; color: #cde; }

    #mode-btns { margin-top: auto; padding-top: 12px; display: flex; gap: 6px; }
    #mode-btns button {
      flex: 1; padding: 5px; background: #252545; border: 1px solid #444;
      color: #aac; font-family: monospace; font-size: 11px; cursor: pointer; border-radius: 3px;
    }
    #mode-btns button:hover  { background: #353565; }
    #mode-btns button.active { background: #1a3a1a; border-color: #5cb85c; color: #5cb85c; }

    #expand-hint {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #445; pointer-events: none; display: none;
      background: #1a1a2ecc; padding: 2px 8px; border-radius: 3px;
    }

    #search-wrap { position: relative; margin-bottom: 10px; }
    #search-input {
      width: 100%; padding: 5px 8px; background: #12122a; border: 1px solid #333;
      color: #e0e0e0; font-family: monospace; font-size: 12px; border-radius: 3px;
      box-sizing: border-box;
    }
    #search-input:focus { outline: none; border-color: #7755aa; }
    #search-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
      background: #1a1a2e; border: 1px solid #333; border-top: none;
      max-height: 260px; overflow-y: auto; display: none;
    }
    .search-row {
      display: flex; align-items: center; gap: 6px; padding: 4px 8px;
      font-size: 11px; cursor: pointer; border-bottom: 1px solid #252545;
    }
    .search-row:hover { background: #252545; }
    .search-row.no-results { cursor: default; color: #556; font-style: italic; }
    .search-row.no-results:hover { background: transparent; }
    .search-kind {
      font-size: 9px; padding: 1px 4px; border-radius: 3px; flex-shrink: 0;
      background: #333; color: #99a;
    }
    .search-kind.field, .search-kind.column { background: #2a3a2a; color: #7c7; }

    .panel-link { color: #7fa8d9; cursor: pointer; text-decoration: underline dotted; }
    .panel-link:hover { color: #a8c8f0; }
    .hub-badge {
      display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: #4a2010; color: #ff9944; margin-bottom: 6px;
    }
    .panel-toggle { display: block; font-size: 10px; color: #778; margin: 2px 0; cursor: pointer; }
    .panel-props { font-size: 11px; margin: 6px 0; }
    .panel-fileline { font-size: 10px; color: #8899bb; margin: 6px 0; user-select: text; }
    .neighbor-line { font-size: 11px; margin: 4px 0; }
    .neighbor-line b { color: #8899bb; font-weight: normal; }
    .neighbor-line .more { color: #556; font-size: 10px; }
    .neighbor-line .via { font-size: 9px; color: #667; margin-left: 2px; }
    .panel-raw { margin-top: 8px; }
    #exclusions-info { font-size: 10px; color: #778; margin-bottom: 6px; }

    .note-block {
      margin: 6px 0 10px; padding: 8px 10px; border-radius: 4px;
      background: #2a1f10; border-left: 3px solid #ff9900; font-size: 11px; line-height: 1.5;
    }
    .note-block.stale { opacity: 0.6; border-left-color: #dc3545; }
    .note-label {
      display: block; font-size: 9px; color: #ff9944; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .note-warning { display: block; color: #ff8895; font-size: 10px; margin-top: 6px; }
    .note-absent { font-size: 10px; color: #667; margin: 6px 0 10px; font-style: italic; }
    .note-absent code { color: #8899bb; font-family: monospace; font-style: normal; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div style="font-size:13px;font-weight:bold;color:#aad;margin-bottom:4px">Comprehension Compiler</div>
    <div id="exclusions-info"></div>

    <div id="search-wrap">
      <input type="text" id="search-input" placeholder="Buscar nodo, tabla, columna, campo…" autocomplete="off">
      <div id="search-dropdown"></div>
    </div>

    <div class="section-title">Endpoints</div>
    <div id="ep-list"></div>

    <div class="section-title" style="margin-top:10px">Nodos</div>
    <div class="node-legend"><span class="node-dot" style="background:#4a90d9"></span>endpoint</div>
    <div class="node-legend"><span class="node-dot" style="background:#aac"></span>function</div>
    <div class="node-legend"><span class="node-dot" style="background:#5cb85c"></span>model</div>
    <div class="node-legend"><span class="node-dot" style="background:#e8a838"></span>table</div>

    <div class="section-title" style="margin-top:10px">Aristas</div>
    <div id="edge-controls"></div>
    <label class="edge-row" style="font-size:10px;color:#778;margin-top:3px">
      <input type="checkbox" id="labels-all" checked onchange="toggleAllLabels(this.checked)">
      todas activas
    </label>

    <div id="gaps-section"></div>

    <div id="mode-btns">
      <button id="btn-subgraph" class="active" onclick="setMode('subgraph')">Subgrafo</button>
      <button id="btn-map"                     onclick="setMode('map')">Mapa completo</button>
    </div>
  </div>

  <div id="main">
    <div id="cy"></div>
    <div id="placeholder">← Selecciona un endpoint</div>
    <div id="expand-hint">doble clic en un nodo para expandir vecinos</div>
    <div id="panel">
      <h3 id="panel-title"></h3>
      <div id="panel-body"></div>
    </div>
  </div>

  <script>
    const GRAPH = __GRAPH_JSON__;

    // ── Phase 2 notes overlay ────────────────────────────────────────────────
    // Loaded via fetch, not embedded — keeps index.html byte-identical whether
    // or not `cc annotate` has ever run, and means graph.json/notes.json stay
    // physically separate files even in the rendered output (a compliance
    // handoff can omit notes.json and the page still works, just without
    // notes). Requires serving the output dir over HTTP (--serve, or any
    // static file server) — opening index.html directly via file:// will not
    // load notes (browsers block local fetch()), which degrades gracefully to
    // "sin nota" everywhere, same as if notes.json didn't exist.
    let NOTES = {};
    fetch('notes.json')
      .then(r => (r.ok ? r.json() : {}))
      .then(n => { NOTES = n; })
      .catch(() => {});

    // ── Constants ─────────────────────────────────────────────────────────────
    const EDGE_COLORS = {
      handles:    '#999999',
      calls:      '#5b8dd9',
      uses_model: '#5cb85c',
      reads:      '#17a2b8',
      writes:     '#e06020',
    };

    // Fast lookup
    const nodeById = {};
    for (const n of GRAPH.nodes) nodeById[n.id] = n;

    const edgesFrom = {}, edgesTo = {};
    for (const e of GRAPH.edges) {
      (edgesFrom[e.from_] = edgesFrom[e.from_] || []).push(e);
      (edgesTo[e.to]      = edgesTo[e.to]      || []).push(e);
    }

    // ── Search index ─────────────────────────────────────────────────────────
    function buildSearchIndex() {
      const index = [];
      for (const n of GRAPH.nodes) {
        const label = short(n.id);
        index.push({ matchText: label, kind: 'node', nodeId: n.id, label });

        if (n.type === 'model' && Array.isArray(n.props.fields)) {
          for (const f of n.props.fields) {
            index.push({
              matchText: f.name, kind: 'field', nodeId: n.id,
              label: `campo ${f.name} en ${label}`,
            });
          }
        }
        if (n.type === 'table' && Array.isArray(n.props.columns)) {
          for (const col of n.props.columns) {
            index.push({
              matchText: col, kind: 'column', nodeId: n.id,
              label: `columna ${col} en ${label}`,
            });
          }
        }
      }
      return index;
    }

    const SEARCH_INDEX = buildSearchIndex();

    function searchGraph(query) {
      const q = query.trim().toLowerCase();
      if (q.length < 2) return [];
      return SEARCH_INDEX.filter(e => e.matchText.toLowerCase().includes(q));
    }

    // ── Hub detection ────────────────────────────────────────────────────────
    const HUB_MIN_PERCENT  = 0.15;
    const HUB_MIN_ABSOLUTE = 5;
    const functionCount = GRAPH.nodes.filter(n => n.type === 'function').length;
    const hubThreshold = Math.max(HUB_MIN_ABSOLUTE, Math.ceil(HUB_MIN_PERCENT * functionCount));
    const HUB_IDS = new Set(
      GRAPH.nodes.filter(n => (edgesTo[n.id] || []).length >= hubThreshold).map(n => n.id)
    );

    // ── Hidden nodes (in-memory only — F5 is the undo) ──────────────────────────
    const hiddenNodes = new Set();

    // ── State ─────────────────────────────────────────────────────────────────
    let currentMode  = null;
    let currentRoot  = null;
    let activeEpBtn  = null;
    const labelState = {};

    // ── Cytoscape ─────────────────────────────────────────────────────────────
    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [],
      style: [
        { selector: 'node', style: {
            label: 'data(label)', 'font-size': 10, 'background-color': '#aac',
            'text-wrap': 'wrap', 'text-max-width': 120, color: '#dde',
            'text-background-color': '#12122a', 'text-background-opacity': 0.75,
            'text-background-padding': '2px',
          }
        },
        { selector: "node[type='endpoint']", style: { 'background-color': '#4a90d9' } },
        { selector: "node[type='table']",    style: { 'background-color': '#e8a838' } },
        { selector: "node[type='model']",    style: { 'background-color': '#5cb85c' } },
        { selector: 'node.inferred',  style: { 'border-width': 2, 'border-color': '#ff9900' } },
        { selector: 'node.root-node', style: { 'border-width': 3, 'border-color': '#7755aa', width: 40, height: 40 } },
        { selector: 'node.search-hit', style: { 'border-width': 4, 'border-color': '#ffdd44' } },
        { selector: 'edge', style: {
            label: 'data(label)', 'font-size': 8, 'curve-style': 'bezier',
            'target-arrow-shape': 'triangle', width: 1.5,
            'line-color': '#aaa', 'target-arrow-color': '#aaa', color: '#ccc',
            'text-background-color': '#12122a', 'text-background-opacity': 0.75,
            'text-background-padding': '2px',
          }
        },
        ...Object.entries(EDGE_COLORS).map(([type, color]) => ({
          selector: `edge[label="${type}"]`,
          style: { 'line-color': color, 'target-arrow-color': color },
        })),
      ],
      layout: { name: 'preset' },
    });

    // ── Element builders ──────────────────────────────────────────────────────
    function makeElems(nodeIds, rootId) {
      const elems = [];
      for (const id of nodeIds) {
        if (hiddenNodes.has(id)) continue;
        const n = nodeById[id];
        if (!n) continue;
        elems.push({
          data: {
            id: n.id, label: short(n.id), type: n.type,
            inferred: n.inferred, file: n.file, line: n.line, hash: n.hash, ...n.props,
          },
          classes: [n.inferred ? 'inferred' : '', id === rootId ? 'root-node' : ''].join(' ').trim(),
        });
      }
      for (const e of GRAPH.edges) {
        if (nodeIds.has(e.from_) && nodeIds.has(e.to) &&
            !hiddenNodes.has(e.from_) && !hiddenNodes.has(e.to))
          elems.push({ data: { id: e.from_ + '→' + e.to, source: e.from_, target: e.to, label: e.type, ...e.props } });
      }
      return elems;
    }

    // ── BFS ───────────────────────────────────────────────────────────────────
    function reachableFrom(startId) {
      const visited = new Set([startId]);
      const queue   = [startId];
      while (queue.length) {
        const curr = queue.shift();
        for (const e of (edgesFrom[curr] || [])) {
          if (!visited.has(e.to)) { visited.add(e.to); queue.push(e.to); }
        }
      }
      return visited;
    }

    // ── Reverse BFS: which endpoints can reach this node, stopping at hubs ──────
    function reachableFromEndpoints(targetId) {
      const visited     = new Set([targetId]);
      const queue        = [targetId];
      const endpointIds  = new Set();
      const stoppedHubs  = new Set();

      while (queue.length) {
        const curr = queue.shift();
        for (const e of (edgesTo[curr] || [])) {
          const prev = e.from_;
          if (visited.has(prev)) continue;
          visited.add(prev);

          const prevNode = nodeById[prev];
          if (prevNode && prevNode.type === 'endpoint') endpointIds.add(prev);

          if (HUB_IDS.has(prev)) { stoppedHubs.add(prev); continue; }
          queue.push(prev);
        }
      }
      return { endpointIds: [...endpointIds], stoppedHubs: [...stoppedHubs] };
    }

    // ── Layout ────────────────────────────────────────────────────────────────
    function applyLayout(animate) {
      const opts = currentMode === 'map'
        ? { name: 'cose', animate, animationDuration: 300 }
        : {
            name: 'dagre', rankDir: 'TB',
            padding: 30,
            animate, animationDuration: 300,
          };
      cy.layout(opts).run();
    }

    // ── Load subgraph ─────────────────────────────────────────────────────────
    function loadEndpoint(endpointId, btn) {
      currentMode = 'subgraph';
      currentRoot = endpointId;

      if (activeEpBtn) activeEpBtn.classList.remove('active');
      activeEpBtn = btn;
      btn.classList.add('active');
      document.getElementById('btn-subgraph').classList.add('active');
      document.getElementById('btn-map').classList.remove('active');

      const nodeIds = reachableFrom(endpointId);
      cy.elements().remove();
      cy.add(makeElems(nodeIds, endpointId));
      restoreEdgeLabels();
      applyLayout(false);
      cy.fit(cy.elements(), 40);
      hidePlaceholder();
      document.getElementById('expand-hint').style.display = 'block';
    }

    // ── Search navigation ─────────────────────────────────────────────────────
    function flashNode(ele) {
      ele.addClass('search-hit');
      setTimeout(() => ele.removeClass('search-hit'), 600);
    }

    function goToSearchResult(entry) {
      const nodeId   = entry.nodeId;
      const existing = cy.getElementById(nodeId);

      if (existing.length) {
        cy.center(existing);
        flashNode(existing);
        showPanel(existing.data());
        return;
      }

      const oneHop = new Set([nodeId]);
      for (const e of (edgesFrom[nodeId] || [])) oneHop.add(e.to);
      for (const e of (edgesTo[nodeId]   || [])) oneHop.add(e.from_);

      currentMode = 'subgraph';
      currentRoot = nodeId;
      if (activeEpBtn) { activeEpBtn.classList.remove('active'); activeEpBtn = null; }
      document.getElementById('btn-subgraph').classList.add('active');
      document.getElementById('btn-map').classList.remove('active');

      cy.elements().remove();
      cy.add(makeElems(oneHop, nodeId));
      restoreEdgeLabels();
      applyLayout(false);
      cy.fit(cy.elements(), 40);
      hidePlaceholder();
      document.getElementById('expand-hint').style.display = 'block';

      const added = cy.getElementById(nodeId);
      flashNode(added);
      showPanel(added.data());
    }

    // ── Mode switch ───────────────────────────────────────────────────────────
    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btn-subgraph').classList.toggle('active', mode === 'subgraph');
      document.getElementById('btn-map').classList.toggle('active', mode === 'map');

      if (mode === 'map') {
        currentRoot = null;
        if (activeEpBtn) { activeEpBtn.classList.remove('active'); activeEpBtn = null; }
        const allIds = new Set(GRAPH.nodes.map(n => n.id));
        cy.elements().remove();
        cy.add(makeElems(allIds, null));
        restoreEdgeLabels();
        applyLayout(true);
        hidePlaceholder();
        document.getElementById('expand-hint').style.display = 'none';
      } else {
        cy.elements().remove();
        showPlaceholder();
        document.getElementById('expand-hint').style.display = 'none';
      }
    }

    // ── Double-tap expand ─────────────────────────────────────────────────────
    cy.on('dbltap', 'node', evt => {
      const nodeId     = evt.target.id();
      const existingIds = new Set(cy.nodes().map(n => n.id()));
      const newIds     = new Set();

      for (const e of (edgesFrom[nodeId] || []))
        if (!existingIds.has(e.to)) newIds.add(e.to);
      for (const e of (edgesTo[nodeId] || []))
        if (!existingIds.has(e.from_)) newIds.add(e.from_);

      if (!newIds.size) return;

      const allIds = new Set([...existingIds, ...newIds]);
      cy.elements().remove();
      cy.add(makeElems(allIds, currentRoot));
      restoreEdgeLabels();
      applyLayout(true);
    });

    // ── Single tap → panel ────────────────────────────────────────────────────
    cy.on('tap', 'node', evt => showPanel(evt.target.data()));

    function showPanel(data) {
      document.getElementById('panel').style.display = 'block';
      cy.resize();
      document.getElementById('panel-title').textContent = data.id;
      document.getElementById('panel-body').innerHTML = renderPanelBody(data);
    }

    function short(id) {
      const n = nodeById[id];
      if (n && n.type === 'endpoint') return `${n.props.method} ${n.props.path}`;
      return id.split(':').slice(1).join(':');
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s == null ? '' : String(s);
      return div.innerHTML;
    }

    function renderProps(data) {
      if (data.type === 'endpoint') {
        return (
          `<div>${data.method} ${data.path}</div>` +
          `<div>handler: <span class="panel-link" data-nav="function:${data.handler}">${data.handler}</span></div>`
        );
      }
      if (data.type === 'function') {
        return `<div>${data.qualname}${data.is_handler ? ' · es handler' : ''}</div>`;
      }
      if (data.type === 'model') {
        const fields = (data.fields || []);
        if (!fields.length) return '<div style="color:#556">(sin campos)</div>';
        return fields.map(f => `<div>${f.name}: ${f.type}</div>`).join('');
      }
      if (data.type === 'table') {
        const columns = data.columns || [];
        if (!columns.length) {
          return '<div class="gap-item gap-warning">⚠ columnas desconocidas — falta DDL</div>';
        }
        return columns.map(c => `<div>${c}</div>`).join('');
      }
      return '';
    }

    const NEIGHBOR_LABELS = {
      'calls:out':      'Llama a',
      'calls:in':       'Llamada por',
      'handles:out':    'Maneja',
      'handles:in':     'Manejado por',
      'uses_model:out': 'Usa modelo',
      'reads:out':      'Lee',
      'writes:out':     'Escribe en',
      'reads:in':       'Leída por',
      'writes:in':      'Escrita por',
    };

    function renderNeighborGroupLine(label, items) {
      const CAP   = 5;
      const shown = items.slice(0, CAP);
      const extra = items.length - shown.length;
      const parts = shown.map(it => {
        const via = it.via ? ` <span class="via">via ${it.via}</span>` : '';
        return `<span class="panel-link" data-nav="${it.targetId}">${short(it.targetId)}</span>${via}`;
      });
      let line = `<div class="neighbor-line"><b>${label}:</b> ${parts.join(', ')}`;
      if (extra > 0) line += ` <span class="more">(+${extra} más)</span>`;
      line += '</div>';
      return line;
    }

    function renderNeighborhood(nodeId) {
      const outByType = {}, inByType = {};
      for (const e of (edgesFrom[nodeId] || [])) {
        (outByType[e.type] = outByType[e.type] || []).push({ targetId: e.to, via: e.props && e.props.via });
      }
      for (const e of (edgesTo[nodeId] || [])) {
        (inByType[e.type] = inByType[e.type] || []).push({ targetId: e.from_, via: e.props && e.props.via });
      }

      let html = '';
      for (const [type, items] of Object.entries(outByType)) {
        const label = NEIGHBOR_LABELS[`${type}:out`];
        if (label) html += renderNeighborGroupLine(label, items);
      }
      for (const [type, items] of Object.entries(inByType)) {
        const label = NEIGHBOR_LABELS[`${type}:in`];
        if (label) html += renderNeighborGroupLine(label, items);
      }
      return html;
    }

    function renderReachableFrom(data) {
      if (data.type === 'endpoint') return '';
      const { endpointIds, stoppedHubs } = reachableFromEndpoints(data.id);
      if (!endpointIds.length) return '';

      const links = endpointIds.map(id =>
        `<span class="panel-link" data-nav="${id}">${short(id)}</span>`
      ).join(', ');

      let hubNote = '';
      if (stoppedHubs.length) {
        const names = stoppedHubs.map(id => short(id)).join(', ');
        const plural = stoppedHubs.length > 1 ? 's' : '';
        hubNote = ` <span class="via">(cálculo excluye ${stoppedHubs.length} hub${plural}: ${names})</span>`;
      }
      return `<div class="neighbor-line"><b>Alcanzable desde:</b> ${links}${hubNote}</div>`;
    }

    function renderNote(data) {
      if (data.type !== 'function' && data.type !== 'endpoint') return '';
      const note = NOTES[data.id];
      if (!note) {
        return `<div class="note-absent">sin nota — <code>cc annotate --node ${data.id}</code></div>`;
      }
      const stale = note.hash !== data.hash;
      const warning = stale
        ? '<span class="note-warning">⚠ desactualizada — el código cambió</span>'
        : '';
      return (
        `<div class="note-block${stale ? ' stale' : ''}">` +
        `<span class="note-label">inferred · ${escapeHtml(note.model)}</span>` +
        `<div>${escapeHtml(note.text)}</div>` +
        warning +
        `</div>`
      );
    }

    function renderPanelBody(data) {
      const hubBadge = HUB_IDS.has(data.id)
        ? `<span class="hub-badge">⚠ hub — ${(edgesTo[data.id] || []).length} llamantes</span>`
        : '';

      const props = { ...data };
      delete props.id; delete props.label; delete props.type; delete props.inferred;
      const rawJson = JSON.stringify(props, null, 2);

      return (
        hubBadge +
        renderNote(data) +
        `<label class="panel-toggle"><input type="checkbox" onchange="togglePanelRaw(this.checked)"> ver raw</label>` +
        `<label class="panel-toggle"><input type="checkbox" onchange="toggleHideNode('${data.id}', this.checked)"> ocultar este nodo</label>` +
        `<div class="panel-props">${renderProps(data)}</div>` +
        `<div class="panel-fileline">${data.file || ''}:${data.line || ''}</div>` +
        renderNeighborhood(data.id) +
        renderReachableFrom(data) +
        `<pre class="panel-raw" style="display:none">${rawJson}</pre>`
      );
    }

    function togglePanelRaw(show) {
      const pre = document.querySelector('#panel-body .panel-raw');
      if (pre) pre.style.display = show ? 'block' : 'none';
    }

    function toggleHideNode(nodeId, hide) {
      if (!hide) return;
      hiddenNodes.add(nodeId);
      cy.getElementById(nodeId).remove();
      document.getElementById('panel').style.display = 'none';
    }

    document.getElementById('panel-body').addEventListener('click', evt => {
      const link = evt.target.closest('[data-nav]');
      if (!link) return;
      goToSearchResult({ nodeId: link.dataset.nav });
    });

    // ── Placeholder ───────────────────────────────────────────────────────────
    function hidePlaceholder() { document.getElementById('placeholder').style.display = 'none'; }
    function showPlaceholder() { document.getElementById('placeholder').style.display = ''; }

    // ── Edge label controls ───────────────────────────────────────────────────
    const edgeTypes = [...new Set(GRAPH.edges.map(e => e.type))].sort();
    for (const type of edgeTypes) labelState[type] = true;

    const ctrl = document.getElementById('edge-controls');
    for (const type of edgeTypes) {
      const color = EDGE_COLORS[type] || '#aaa';
      const count = GRAPH.edges.filter(e => e.type === type).length;
      const row   = document.createElement('label');
      row.className = 'edge-row';
      row.innerHTML =
        `<input type="checkbox" checked onchange="toggleEdgeLabel('${type}', this.checked)">` +
        `<span class="edge-dot" style="background:${color}"></span>` +
        `<span>${type} <span style="color:#556;font-size:10px">(${count})</span></span>`;
      ctrl.appendChild(row);
    }

    function toggleEdgeLabel(type, show) {
      labelState[type] = show;
      cy.style().selector(`edge[label="${type}"]`)
        .style({ label: show ? 'data(label)' : '' }).update();
      document.getElementById('labels-all').checked = Object.values(labelState).every(Boolean);
    }

    function toggleAllLabels(show) {
      for (const type of edgeTypes) {
        labelState[type] = show;
        cy.style().selector(`edge[label="${type}"]`)
          .style({ label: show ? 'data(label)' : '' }).update();
      }
      ctrl.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = show);
    }

    function restoreEdgeLabels() {
      for (const type of edgeTypes) {
        cy.style().selector(`edge[label="${type}"]`)
          .style({ label: labelState[type] ? 'data(label)' : '' }).update();
      }
    }

    // ── Endpoint list, grouped by namespace (handler's module) ─────────────────
    const epList = document.getElementById('ep-list');
    const epByNamespace = new Map();
    for (const n of GRAPH.nodes.filter(n => n.type === 'endpoint')) {
      const handler = n.props.handler || '';
      const dot = handler.lastIndexOf('.');
      const ns = dot === -1 ? '(root)' : handler.slice(0, dot);
      if (!epByNamespace.has(ns)) epByNamespace.set(ns, []);
      epByNamespace.get(ns).push(n);
    }
    for (const ns of [...epByNamespace.keys()].sort()) {
      const header = document.createElement('div');
      header.className = 'ep-namespace';
      header.textContent = ns;
      epList.appendChild(header);
      for (const n of epByNamespace.get(ns)) {
        const btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.innerHTML = `<span class="badge ${n.props.method}">${n.props.method}</span>${n.props.path}`;
        btn.onclick = () => loadEndpoint(n.id, btn);
        epList.appendChild(btn);
      }
    }

    // ── Search UI wiring ──────────────────────────────────────────────────────
    function renderSearchDropdown(matches, query) {
      const dd = document.getElementById('search-dropdown');
      if (!query || query.trim().length < 2) { dd.style.display = 'none'; dd.innerHTML = ''; return; }

      if (!matches.length) {
        dd.innerHTML = '<div class="search-row no-results">sin resultados</div>';
        dd.style.display = 'block';
        return;
      }

      const kindLabel = { node: 'nodo', field: 'campo', column: 'columna' };
      dd.innerHTML = matches.map((m, i) =>
        `<div class="search-row" data-idx="${i}">` +
        `<span class="search-kind ${m.kind}">${kindLabel[m.kind]}</span>` +
        `<span>${m.label}</span></div>`
      ).join('');
      dd.style.display = 'block';

      dd.querySelectorAll('.search-row[data-idx]').forEach(row => {
        row.onclick = () => {
          goToSearchResult(matches[Number(row.dataset.idx)]);
          document.getElementById('search-input').value = '';
          closeSearchDropdown();
        };
      });
    }

    function closeSearchDropdown() {
      const dd = document.getElementById('search-dropdown');
      dd.style.display = 'none';
      dd.innerHTML = '';
    }

    document.getElementById('search-input').addEventListener('input', evt => {
      renderSearchDropdown(searchGraph(evt.target.value), evt.target.value);
    });

    document.getElementById('search-input').addEventListener('keydown', evt => {
      if (evt.key === 'Escape') {
        evt.target.value = '';
        closeSearchDropdown();
      }
    });

    document.addEventListener('click', evt => {
      if (!document.getElementById('search-wrap').contains(evt.target)) closeSearchDropdown();
    });

    <!-- EXCLUSIONS_START -->
    // ── Exclusions ────────────────────────────────────────────────────────────
    if (GRAPH.exclusions && GRAPH.exclusions.length) {
      const totalExcluded = GRAPH.exclusions.reduce((sum, x) => sum + x.count, 0);
      const info = document.getElementById('exclusions-info');
      info.textContent =
        `compilado con ${GRAPH.exclusions.length} exclusión(es) — ${totalExcluded} ficheros fuera`;
      info.title = GRAPH.exclusions.map(x => `${x.pattern}: ${x.count}`).join('\n');
    }
    <!-- EXCLUSIONS_END -->

    // ── Gaps ──────────────────────────────────────────────────────────────────
    if (GRAPH.gaps && GRAPH.gaps.length) {
      const sec = document.getElementById('gaps-section');
      sec.innerHTML = `<div class="section-title" style="margin-top:12px">Gaps (${GRAPH.gaps.length})</div>`;
      for (const g of GRAPH.gaps) {
        const d   = document.createElement('div');
        const sev = (g.severity && g.severity.compliance === 'error') ? 'gap-error' : 'gap-warning';
        d.className = 'gap-item ' + sev;
        d.title     = g.suggested || '';
        d.textContent = '⚠ ' + g.missing;
        sec.appendChild(d);
      }
    }
  </script>
</body>
</html>
